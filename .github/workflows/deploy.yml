name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application jar
        working-directory: old_bicycle_project
        run: ./mvnw -q -DskipTests clean package

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy jar to VPS
        run: |
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=yes old_bicycle_project/target/old_bicycle_project-0.0.1-SNAPSHOT.jar \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ec2-user/marketbike/app.jar.new

      - name: Deploy with backup and health check
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -euo pipefail
            cd /home/ec2-user/marketbike
            if [ -f app.jar ]; then cp -f app.jar app.jar.bak; fi
            mv -f app.jar.new app.jar
            sudo systemctl restart marketbike
            sleep 10
            if curl -fsS http://127.0.0.1:8080/v3/api-docs >/dev/null; then
              rm -f app.jar.bak
              sudo systemctl is-active --quiet marketbike
            else
              if [ -f app.jar.bak ]; then mv -f app.jar.bak app.jar; sudo systemctl restart marketbike; fi
              exit 1
            fi'
