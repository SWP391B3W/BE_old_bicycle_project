name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application jar
        working-directory: old_bicycle_project
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests clean package

      - name: Prepare SSH key
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "Missing one or more VPS secrets: VPS_SSH_KEY, VPS_HOST, VPS_USER"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          touch ~/.ssh/known_hosts

      - name: Copy jar to VPS
        run: |
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=accept-new old_bicycle_project/target/old_bicycle_project-0.0.1-SNAPSHOT.jar \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ec2-user/marketbike/app.jar.new

      - name: Deploy with backup and health check
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set -euo pipefail
            cd /home/ec2-user/marketbike

            echo "=== VPS Resources ==="
            df -h /
            free -m

            if [ -f app.jar ]; then cp -f app.jar app.jar.bak; fi
            mv -f app.jar.new app.jar
            sudo systemctl restart marketbike

            # Wait for app to be ready (retry up to 120 seconds, every 3s)
            max_attempts=40
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              sleep 3
              if curl -fsS http://127.0.0.1:8080/v3/api-docs >/dev/null 2>&1; then
                echo "✓ Health check passed after $((attempt * 3))s"
                rm -f app.jar.bak
                exit 0
              fi
              attempt=$((attempt + 1))
              echo "⏳ Waiting... (attempt $attempt/$max_attempts, ~$((attempt * 3))s elapsed)"
            done

            # Health check failed — print app logs for diagnosis
            echo "✗ Health check failed after $max_attempts attempts (~120 seconds)"
            echo ""
            echo "=== Last 60 lines of app log ==="
            sudo journalctl -u marketbike --no-pager -n 60 || true

            echo ""
            echo "=== Disk/Memory at failure ==="
            df -h /
            free -m

            if [ -f app.jar.bak ]; then
              echo "Rolling back to previous version..."
              mv -f app.jar.bak app.jar
              sudo systemctl restart marketbike
            fi
            exit 1'
