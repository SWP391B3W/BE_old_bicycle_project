name: Fetch VPS Logs

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to filter logs (e.g. payment, sepay, webhook, order, error)'
        required: false
        default: 'payment'
      lines:
        description: 'Number of recent log lines to fetch before filtering'
        required: false
        default: '500'

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

      - name: Fetch logs from VPS
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo journalctl -u marketbike --no-pager -n ${{ inputs.lines }} | grep -i '${{ inputs.keyword }}' || echo 'No matching log lines found for keyword: ${{ inputs.keyword }}'"
