spring.application.name=old_bicycle_project
server.port=${PORT:8080}

# Debug Security
logging.level.org.springframework.security=DEBUG

# Database - Supabase Postgres
# Persistent Spring Boot backends should prefer direct connection or session pooler.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
server.forward-headers-strategy=framework

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# ===================== JWT =====================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
# 15 phút (ms)
jwt.refresh-token-expiration=604800000
# 7 ngày (ms)

# ===================== Mail (Gmail SMTP) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================== Google OAuth2 =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===================== App Config =====================
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
auth.password-reset-expiration=3600000

# ===================== Supabase Storage =====================
supabase.url=${SUPABASE_URL:https://dummy.supabase.co}
supabase.anon-key=${SUPABASE_ANON_KEY:dummy_key}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:product-images}
supabase.storage.inspection-report-bucket=${SUPABASE_STORAGE_INSPECTION_REPORT_BUCKET:inspection-reports}

# ===================== Flyway =====================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ===================== Multipart File Upload =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
