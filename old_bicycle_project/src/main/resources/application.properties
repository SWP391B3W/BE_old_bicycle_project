spring.application.name=old_bicycle_project
server.port=${PORT:8080}

# Debug Security
logging.level.org.springframework.security=DEBUG

# Database - Supabase Postgres (Recommended: Use Pooler port 6543 for multiple environments)
# Example DB_URL: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Optimized for Supabase Transaction Pooler
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
server.forward-headers-strategy=framework

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# ===================== JWT =====================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ===================== Mail (Gmail SMTP) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================== Google OAuth2 =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===================== App Config =====================
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
auth.password-reset-expiration=${AUTH_PASSWORD_RESET_EXPIRATION:3600000}

# ===================== SePay =====================
payment.sepay.mock-mode=${SEPAY_MOCK_MODE:false}
payment.sepay.api-base-url=${SEPAY_API_BASE_URL:https://userapi.sepay.vn}
payment.sepay.api-token=${SEPAY_API_TOKEN:}
payment.sepay.webhook-api-key=${SEPAY_WEBHOOK_API_KEY:${SEPAY_WEBHOOK_KEY:}}
payment.sepay.bank-account-id=${SEPAY_BANK_ACCOUNT_ID:}
payment.sepay.bank-bin=${SEPAY_BANK_BIN:}
payment.sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
payment.sepay.account-name=${SEPAY_ACCOUNT_NAME:}

# ===================== Assistant / AI Gateway =====================
assistant.gateway.enabled=${AI_GATEWAY_ENABLED:false}
assistant.gateway.api-base-url=${AI_GATEWAY_API_BASE_URL:https://ai-gateway.vercel.sh/v1/chat/completions}
assistant.gateway.api-key=${AI_GATEWAY_API_KEY:}
assistant.gateway.model=${AI_GATEWAY_MODEL:openai/gpt-4.1-mini}
assistant.gateway.temperature=${AI_GATEWAY_TEMPERATURE:0.2}
assistant.gateway.max-tokens=${AI_GATEWAY_MAX_TOKENS:600}

# ===================== Supabase Storage =====================
supabase.url=${SUPABASE_URL:https://dummy.supabase.co}
supabase.anon-key=${SUPABASE_ANON_KEY:dummy_key}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:product-images}
supabase.storage.inspection-report-bucket=${SUPABASE_STORAGE_INSPECTION_REPORT_BUCKET:inspection-reports}

# ===================== Flyway =====================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ===================== Multipart File Upload =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB


# ===================== GHN (Shipping) Config =====================
ghn.api.url=${GHN_API_URL:https://dev-online-gateway.ghn.vn/shiip/public-api}
ghn.api.token=${GHN_API_TOKEN:}
ghn.shop.id=${GHN_SHOP_ID:}
